      const handleAddModel = () => {
        if (newModel.trim()) { onAddModel(newModel.trim()); setEditModel(newModel.trim()); setNewModel(""); setAddingModel(false); }
      };
      const handleAddProject = () => {
        if (newProject.trim()) { onAddProject(newProject.trim()); setEditProject(newProject.trim()); setNewProject(""); setAddingProject(false); }
      };
      const handleAddEvent = () => {
        if (newEvent.trim()) { onAddEvent && onAddEvent(newEvent.trim()); setEditEvent(newEvent.trim()); setNewEvent(""); setAddingEvent(false); }
      };

      if (!unit) return null;
      const tc = modelColor(editing ? editModel : unit.type);
      const pc = projectColor(editing ? editProject : unit.project);

      return (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", backdropFilter:"blur(10px)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:200, padding:"20px" }}>
          <div style={{ background:"#17171b", border:`1px solid ${C.border}`, borderRadius:"18px", width:"100%", maxWidth:"480px", maxHeight:"85vh", overflow:"auto", boxShadow:"0 32px 100px rgba(0,0,0,0.7)" }}>

            {/* Header */}
            <div style={{ padding:"20px 24px", borderBottom:`1px solid ${C.border}`, display:"flex", justifyContent:"space-between", alignItems:"flex-start", position:"sticky", top:0, background:"#17171b" }}>
              <div>
                <div style={{ fontWeight:"700", fontSize:"16px" }}>{editing ? editName || unit.deviceName : unit.deviceName}</div>
                <div style={{ marginTop:"8px", display:"flex", gap:"6px", flexWrap:"wrap" }}>
                  {(editing ? editProject : unit.project) ? <Tag color={pc}>{editing ? editProject : unit.project}</Tag> : null}
                  {(editing ? editModel   : unit.type)    ? <Tag color={tc}>{editing ? editModel   : unit.type}</Tag>    : <span style={{color:"#444",fontSize:"12px"}}>No type set</span>}
                </div>
              </div>
              <div style={{ display:"flex", gap:"8px" }}>
                {!editing && !deleteConfirm && <button onClick={() => setEditing(true)} style={{ ...btnSmall, color:C.orange, borderColor:C.orange+"50", background:C.orange+"10" }}>Edit</button>}
                {!editing && !deleteConfirm && (
                  <button
                    onClick={async () => {
                      const newVal = !unit.archived;
                      await onEdit(unit.id, { archived: newVal });
                      onClose();
                    }}
                    style={{ ...btnSmall, color: unit.archived ? C.green : C.muted, borderColor: unit.archived ? C.green+"50" : C.border }}>
                    {unit.archived ? "Restore" : "Archive"}
                  </button>
                )}
                {!editing && !deleteConfirm && onDelete && (
                  <button onClick={() => setDeleteConfirm(true)} style={{ ...btnSmall, color:"#ff7070", borderColor:"#ff3b3b40" }}>Delete</button>
                )}
                {deleteConfirm && (
                  <>
                    <span style={{ fontSize:"13px", color:"#ff7070", alignSelf:"center" }}>Delete forever?</span>
                    <button onClick={async () => { await onDelete(unit.id); onClose(); }} style={{ ...btnSmall, color:"#fff", background:"#ef4444", borderColor:"#ef4444" }}>Yes, delete</button>
                    <button onClick={() => setDeleteConfirm(false)} style={btnSmall}>Cancel</button>
                  </>
                )}
                {!deleteConfirm && <button onClick={onClose} style={btnSmall}>Close</button>}
              </div>
            </div>

            {/* Edit mode */}
            {editing ? (
              <div style={{ padding:"20px 24px", borderBottom:`1px solid ${C.border}` }}>
                <div style={{ display:"flex", flexDirection:"column", gap:"14px" }}>

                  <div>
                    <div style={{ ...labelSty, marginBottom:"6px" }}>Device Name</div>
                    <input value={editName} onChange={e => setEditName(e.target.value)} style={inputSty} />
                  </div>

                  <div>
                    <div style={{ ...labelSty, marginBottom:"6px" }}>Project</div>
                    {addingProject ? (
                      <div style={{ display:"flex", gap:"8px" }}>
                        <input value={newProject} onChange={e => setNewProject(e.target.value)} onKeyDown={e => e.key==="Enter" && handleAddProject()} placeholder="New project name…" style={{ ...inputSty, fontSize:"13px" }} autoFocus />
                        <button onClick={handleAddProject} style={{ ...btnOrange, padding:"8px 14px", fontSize:"13px" }}>Add</button>
                        <button onClick={() => setAddingProject(false)} style={{ ...btnGhost, padding:"8px 12px", fontSize:"13px" }}>✕</button>
                      </div>
                    ) : (
                      <div style={{ display:"flex", gap:"8px" }}>
                        <select value={editProject} onChange={e => setEditProject(e.target.value)} style={{ ...selectSty, flex:1 }}>
                          <option value="">Select a project…</option>
                          {allProjects.map(p => <option key={p} value={p}>{p}</option>)}
                        </select>
                        <button onClick={() => setAddingProject(true)} title="Add new project" style={{ ...btnGhost, padding:"8px 12px", fontSize:"16px" }}>+</button>
                      </div>
                    )}
                  </div>

                  <div>
                    <div style={{ ...labelSty, marginBottom:"6px" }}>Type</div>
                    {addingModel ? (
                      <div style={{ display:"flex", gap:"8px" }}>
                        <input value={newModel} onChange={e => setNewModel(e.target.value)} onKeyDown={e => e.key==="Enter" && handleAddModel()} placeholder="New type name…" style={{ ...inputSty, fontSize:"13px" }} autoFocus />
                        <button onClick={handleAddModel} style={{ ...btnOrange, padding:"8px 14px", fontSize:"13px" }}>Add</button>
                        <button onClick={() => setAddingModel(false)} style={{ ...btnGhost, padding:"8px 12px", fontSize:"13px" }}>✕</button>
                      </div>
                    ) : (
                      <div style={{ display:"flex", gap:"8px" }}>
                        <select value={editModel} onChange={e => setEditModel(e.target.value)} style={{ ...selectSty, flex:1 }}>
                          <option value="">Select a type…</option>
                          {allModels.map(m => <option key={m} value={m}>{m}</option>)}
                        </select>
                        <button onClick={() => setAddingModel(true)} title="Add new type" style={{ ...btnGhost, padding:"8px 12px", fontSize:"16px" }}>+</button>
                      </div>
                    )}
                  </div>

                  {lists && lists.length > 0 && (
                    <div>
                      <div style={{ ...labelSty, marginBottom:"6px" }}>List</div>
                      <select value={editList} onChange={e => setEditList(e.target.value)} style={{ ...selectSty, width:"100%" }}>
                        <option value="">No list</option>
                        {lists.filter(l => !l.archived).map(l => <option key={l.id} value={l.name}>{l.name}</option>)}
                        {editList && !lists.filter(l=>!l.archived).some(l=>l.name===editList) && <option value={editList}>{editList} (archived)</option>}
                      </select>
                    </div>
                  )}

                  <div>
                    <div style={{ display:"flex", alignItems:"baseline", gap:"8px", marginBottom:"6px" }}>
                      <div style={labelSty}>Firmware Version</div>
                      <span style={{ fontSize:"11px", color:C.muted }}>optional</span>
                    </div>
                    <input value={editFw} onChange={e => setEditFw(e.target.value)} placeholder="e.g. v2.5.1" style={{ ...inputSty, fontFamily:"monospace" }} />
                  </div>

                  <div>
                    <div style={{ ...labelSty, marginBottom:"6px" }}>Owner</div>
                    <input value={editOwner} onChange={e => setEditOwner(e.target.value)} placeholder="Name…" style={inputSty} />
                  </div>

                  <div>
                    <div style={{ display:"flex", alignItems:"baseline", gap:"8px", marginBottom:"6px" }}>
                      <div style={labelSty}>Notes</div>
                      <span style={{ fontSize:"11px", color:C.muted }}>optional</span>
                    </div>
                    <textarea value={editNotes} onChange={e => setEditNotes(e.target.value)} placeholder="Any notes about this unit…" rows={3} style={{ ...inputSty, resize:"vertical", lineHeight:"1.5" }} />
                  </div>

                  {/* Event */}
                  <div>
                    <div style={{ ...labelSty, marginBottom:"6px" }}>Event</div>
                    {addingEvent ? (
                      <div style={{ display:"flex", gap:"8px" }}>
                        <input value={newEvent} onChange={e => setNewEvent(e.target.value)} onKeyDown={e => e.key==="Enter" && handleAddEvent()} placeholder="New event name…" style={{ ...inputSty, fontSize:"13px" }} autoFocus />
                        <button onClick={handleAddEvent} style={{ ...btnOrange, padding:"8px 14px", fontSize:"13px" }}>Add</button>
                        <button onClick={() => setAddingEvent(false)} style={{ ...btnGhost, padding:"8px 12px", fontSize:"13px" }}>✕</button>
                      </div>
                    ) : (
                      <div style={{ display:"flex", gap:"8px" }}>
                        <select value={editEvent} onChange={e => setEditEvent(e.target.value)} style={{ ...selectSty, flex:1 }}>
                          <option value="">No event</option>
                          {(allEvents || []).map(ev => <option key={ev} value={ev}>{ev}</option>)}
                        </select>
                        <button onClick={() => setAddingEvent(true)} title="Add new event type" style={{ ...btnGhost, padding:"8px 12px", fontSize:"16px" }}>+</button>
                      </div>
                    )}
                  </div>

                  {/* Reference Links */}
                  <div>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"8px" }}>
                      <div style={labelSty}>Reference Links</div>
                      <button onClick={addLink} style={{ ...btnSmall, fontSize:"12px", padding:"4px 10px", color:C.orange, borderColor:C.orange+"50", background:C.orange+"10" }}>+ Add link</button>
                    </div>
                    {editLinks.length === 0 && <div style={{ color:"#444", fontSize:"12px" }}>No links yet</div>}
                    {editLinks.map((link, i) => (
                      <div key={i} style={{ display:"flex", gap:"8px", marginBottom:"8px", alignItems:"center" }}>
                        <input value={link.name} onChange={e => updateLink(i, "name", e.target.value)} placeholder="Link name…" style={{ ...inputSty, flex:"0 0 120px", fontSize:"13px" }} />
                        <input value={link.url} onChange={e => updateLink(i, "url", e.target.value)} placeholder="https://…" style={{ ...inputSty, flex:1, fontSize:"13px", fontFamily:"monospace" }} />
                        <button onClick={() => removeLink(i)} style={{ background:"none", border:"none", color:"#ff7070", cursor:"pointer", fontSize:"18px", lineHeight:1, flexShrink:0, padding:"0 2px" }}>×</button>
                      </div>
                    ))}
                  </div>

                  <div style={{ display:"flex", gap:"10px", marginTop:"4px" }}>
                    <button onClick={handleSave} disabled={saving} style={{ ...btnOrange, flex:1, opacity:saving?0.7:1 }}>{saving ? "Saving…" : "Save Changes"}</button>
                    <button onClick={() => { setEditing(false); setEditName(unit.deviceName); setEditFw(unit.firmwareVersion); setEditModel(unit.type); setEditProject(unit.project||""); setEditList(unit.list||""); setEditOwner(unit.owner||""); setEditNotes(unit.notes||""); setEditEvent(unit.event||""); setEditLinks(Array.isArray(unit.links)?[...unit.links]:[]); }} style={{ ...btnGhost, flex:1 }}>Cancel</button>
                  </div>
                </div>
              </div>
            ) : (
              /* View mode */
              <div style={{ padding:"20px 24px", borderBottom:`1px solid ${C.border}` }}>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"18px" }}>
                  {[
                    { label:"Serial Number",    value:unit.serialNumber,           mono:true },
                    { label:"Project",          value:unit.project    || "—" },
                    { label:"List",             value:unit.list       || "—" },
                    { label:"Firmware Version", value:unit.firmwareVersion || "—", mono:true },
                    { label:"Current Owner",    value:unit.owner,                  orange:true },
                    { label:"Last Seen",        value:unit.lastSeen },
                  ].map(({ label, value, mono, orange }) => (
                    <div key={label}>
                      <div style={labelSty}>{label}</div>
                      <div style={{ fontSize:"14px", fontWeight:"600", marginTop:"5px", fontFamily:mono?"monospace":"inherit", color:orange?C.orange:C.text }}>{value||"—"}</div>
                    </div>
                  ))}
                  {unit.event && (
                    <div>
                      <div style={labelSty}>Event</div>
                      <div style={{ marginTop:"5px" }}><Tag color="#a78bfa">{unit.event}</Tag></div>
                    </div>
                  )}
                  {unit.notes && (
                    <div style={{ gridColumn:"1 / -1" }}>
                      <div style={labelSty}>Notes</div>
                      <div style={{ fontSize:"13px", marginTop:"5px", color:C.muted, lineHeight:"1.6", whiteSpace:"pre-wrap" }}>{unit.notes}</div>
                    </div>
                  )}
                  {Array.isArray(unit.links) && unit.links.length > 0 && (
                    <div style={{ gridColumn:"1 / -1" }}>
                      <div style={{ ...labelSty, marginBottom:"8px" }}>Reference Links</div>
                      <div style={{ display:"flex", flexDirection:"column", gap:"6px" }}>
                        {unit.links.filter(l => l.url).map((l, i) => (
                          <a key={i} href={l.url} target="_blank" rel="noopener noreferrer"
                             style={{ display:"inline-flex", alignItems:"center", gap:"6px", fontSize:"13px", color:C.blue, textDecoration:"none", background:C.blue+"12", border:`1px solid ${C.blue}30`, borderRadius:"7px", padding:"6px 12px", width:"fit-content" }}>
                            <span>🔗</span>
                            <span style={{ fontWeight:"600" }}>{l.name || l.url}</span>
                            {l.name && <span style={{ color:C.muted, fontSize:"11px", fontFamily:"monospace", overflow:"hidden", textOverflow:"ellipsis", maxWidth:"200px", whiteSpace:"nowrap" }}>{l.url}</span>}
                          </a>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* History tabs */}
            <div style={{ padding:"20px 24px" }}>
              {/* Tab switcher */}
              <div style={{ display:"flex", gap:"0", marginBottom:"16px", borderBottom:`1px solid ${C.border}` }}>
                {[
                  { key:"edits",     label:`Edit History${editHistory.length > 0 ? ` (${editHistory.length})` : ""}` },
                  { key:"transfers", label:`Transfers${transfers.length > 0 ? ` (${transfers.length})` : ""}` },
                ].map(t => (
                  <button key={t.key} onClick={() => setHistTab(t.key)} style={{ background:"none", border:"none", borderBottom:histTab===t.key?`2px solid ${C.orange}`:"2px solid transparent", color:histTab===t.key?C.text:C.muted, padding:"6px 14px 10px", fontSize:"12px", fontWeight:histTab===t.key?"700":"400", cursor:"pointer", marginBottom:"-1px" }}>
                    {t.label}
                  </button>
                ))}
              </div>

              {loadingHist ? (
                <div style={{ color:C.muted, fontSize:"13px" }}>Loading…</div>
              ) : histTab === "edits" ? (
                /* Edit History */
                editHistory.length === 0 ? (
                  <div style={{ color:"#444", fontSize:"13px" }}>No edits logged yet</div>
                ) : editHistory.map((h, i) => {
                  const dateStr = h.date ? new Date(h.date).toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" }) : "—";
                  const timeStr = h.date ? new Date(h.date).toLocaleTimeString("en-US", { hour:"numeric", minute:"2-digit" }) : "";
                  const isFirst = i === 0;
                  const isLast  = i === editHistory.length - 1;
                  return (
                    <div key={i} style={{ display:"flex", gap:"12px", paddingBottom:isLast?0:"14px" }}>
                      <div style={{ display:"flex", flexDirection:"column", alignItems:"center", width:"14px", flexShrink:0 }}>
                        <div style={{ width:"8px", height:"8px", borderRadius:"50%", background:isFirst?C.orange:"#3a3a44", marginTop:"5px", flexShrink:0 }} />
                        {!isLast && <div style={{ width:"2px", flex:1, background:"#2a2a34", marginTop:"4px" }} />}
                      </div>
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ fontSize:"13px", fontWeight:"600", color:isFirst?C.text:C.muted }}>
                          <span style={{ color:C.orange+"cc" }}>{h.field}</span>
                          <span style={{ fontWeight:"400", color:C.muted }}> changed</span>
                        </div>
                        <div style={{ fontSize:"12px", color:C.muted, marginTop:"2px", display:"flex", gap:"6px", flexWrap:"wrap", alignItems:"center" }}>
                          {h.oldValue && <><span style={{ textDecoration:"line-through", opacity:0.6 }}>{h.oldValue}</span><span>→</span></>}
                          <span style={{ color:C.text+"cc" }}>{h.newValue || "—"}</span>
                        </div>
                        <div style={{ fontSize:"11px", color:"#555", marginTop:"3px" }}>{dateStr}{timeStr ? ` · ${timeStr}` : ""}</div>
                      </div>
                    </div>
                  );
                })
              ) : (
                /* Transfer History */
                transfers.length === 0 ? (
                  <div style={{ color:"#444", fontSize:"13px" }}>No transfers logged yet</div>
                ) : transfers.map((t, i) => {
                  const isLatest = i === transfers.length - 1;
                  const dateStr  = t.date ? new Date(t.date).toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" }) : "—";
                  return (
                    <div key={i} style={{ display:"flex", gap:"14px", paddingBottom:isLatest?0:"16px" }}>
                      <div style={{ display:"flex", flexDirection:"column", alignItems:"center", width:"16px", flexShrink:0 }}>
                        <div style={{ width:"10px", height:"10px", borderRadius:"50%", background:isLatest?C.orange:"#3a3a44", marginTop:"4px", flexShrink:0 }} />
                        {!isLatest && <div style={{ width:"2px", flex:1, background:"#2a2a34", marginTop:"4px" }} />}
                      </div>
                      <div>
                        <div style={{ fontWeight:"600", fontSize:"14px", color:isLatest?C.text:C.muted }}>
                          {t.newOwner}
                          {isLatest && <span style={{ marginLeft:"8px", fontSize:"11px", color:C.orange }}>Current</span>}
                        </div>
                        <div style={{ color:C.muted, fontSize:"12px", marginTop:"2px" }}>{dateStr}</div>
                      </div>
                    </div>
                  );
                })
              )}
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // ADD TO LIST MODAL
    // ─────────────────────────────────────────────────────────────────────────

    function AddToListModal({ listName, units, onAddSelected, onConnectNew, onClose }) {
      const [selected, setSelected] = useState(new Set());
      const [adding, setAdding]     = useState(false);

      const inList  = units.filter(u => u.list === listName);
      const outside = units.filter(u => u.list !== listName);

      const toggle = (id) => setSelected(prev => {
        const next = new Set(prev);
        if (next.has(id)) next.delete(id); else next.add(id);
        return next;
      });

      const handleAdd = async () => {
        if (selected.size === 0) return;
        setAdding(true);
        await onAddSelected([...selected]);
        setAdding(false);
      };

      return (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", backdropFilter:"blur(10px)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:200, padding:"20px" }}>
          <div style={{ background:"#17171b", border:`1px solid ${C.border}`, borderRadius:"18px", width:"100%", maxWidth:"500px", maxHeight:"85vh", display:"flex", flexDirection:"column", boxShadow:"0 32px 100px rgba(0,0,0,0.7)" }}>

            {/* Header */}
            <div style={{ padding:"20px 24px", borderBottom:`1px solid ${C.border}`, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              <div>
                <div style={{ fontWeight:"700", fontSize:"16px" }}>Add devices to list</div>
                <div style={{ color:C.muted, fontSize:"13px", marginTop:"3px" }}>"{listName}"</div>
              </div>
              <button onClick={onClose} style={{ background:"none", border:"none", color:C.muted, cursor:"pointer", fontSize:"20px", lineHeight:1 }}>×</button>
            </div>

            {/* Already in list */}
            {inList.length > 0 && (
              <div style={{ padding:"12px 24px", borderBottom:`1px solid ${C.border}`, background:C.item+"60" }}>
                <div style={{ ...labelSty, marginBottom:"8px" }}>Already in this list ({inList.length})</div>
                <div style={{ display:"flex", flexWrap:"wrap", gap:"6px" }}>
                  {inList.map(u => (
                    <span key={u.id} style={{ fontSize:"12px", color:C.muted, background:C.border+"60", borderRadius:"6px", padding:"3px 9px" }}>{u.deviceName}</span>
                  ))}
                </div>
              </div>
            )}

            {/* Device list */}
            <div style={{ flex:1, overflowY:"auto", padding:"12px 24px" }}>
              {outside.length === 0 ? (
                <div style={{ textAlign:"center", padding:"32px 0", color:C.muted, fontSize:"13px" }}>
                  All registered devices are already in this list
                </div>
              ) : (
                <div style={{ display:"flex", flexDirection:"column", gap:"6px" }}>
                  {outside.map(u => {
                    const isChecked = selected.has(u.id);
                    return (
                      <div key={u.id} onClick={() => toggle(u.id)}
                        style={{ display:"flex", alignItems:"center", gap:"12px", padding:"10px 12px", borderRadius:"8px", cursor:"pointer", background: isChecked ? C.orange+"12" : "transparent", border:`1px solid ${isChecked ? C.orange+"50" : C.border}`, transition:"all 0.1s" }}>
                        <div style={{ width:"18px", height:"18px", borderRadius:"4px", border:`2px solid ${isChecked ? C.orange : C.muted}`, background: isChecked ? C.orange : "transparent", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, transition:"all 0.1s" }}>
                          {isChecked && <span style={{ color:"#fff", fontSize:"12px", fontWeight:"700", lineHeight:1 }}>✓</span>}
                        </div>
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ fontWeight:"600", fontSize:"14px", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{u.deviceName}</div>
                          <div style={{ color:C.muted, fontSize:"12px", fontFamily:"monospace" }}>{u.serialNumber}</div>
                        </div>
                        {u.list && <span style={{ fontSize:"11px", color:C.muted, background:C.border, borderRadius:"20px", padding:"2px 8px", whiteSpace:"nowrap" }}>{u.list}</span>}
                        {u.owner && u.owner !== "Unregistered" && (
                          <div style={{ display:"flex", alignItems:"center", gap:"6px", flexShrink:0 }}>
                            <Avatar name={u.owner} size={22} />
                            <span style={{ fontSize:"12px", color:C.muted }}>{u.owner}</span>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>

            {/* Footer */}
            <div style={{ padding:"16px 24px", borderTop:`1px solid ${C.border}`, display:"flex", gap:"10px" }}>
              <button onClick={onConnectNew} style={{ ...btnGhost, flex:1 }}>🔗 Connect new device</button>
              <button onClick={handleAdd} disabled={selected.size === 0 || adding}
                style={{ ...btnOrange, flex:1, opacity: selected.size === 0 || adding ? 0.5 : 1 }}>
                {adding ? "Adding…" : selected.size > 0 ? `Add ${selected.size} device${selected.size !== 1 ? "s" : ""}` : "Select devices above"}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // LISTS TAB
    // ─────────────────────────────────────────────────────────────────────────

    function ListsTab({ lists, units, onAdd, onUpdate, onDelete, onAddDevices, onSelect }) {
      const [newName, setNewName]           = useState("");
      const [adding, setAdding]             = useState(false);
      const [editId, setEditId]             = useState(null);
      const [editName, setEditName]         = useState("");
      const [deleteConfirm, setDeleteConfirm] = useState(null);
      const [showArchived, setShowArchived] = useState(false);
      const [expandedId, setExpandedId]     = useState(null);

      const activeLists   = lists.filter(l => !l.archived);
      const archivedLists = lists.filter(l => l.archived);

      const handleAdd = () => {
        if (newName.trim()) { onAdd(newName.trim()); setNewName(""); setAdding(false); }
      };

      const handleRename = (id) => {
        if (editName.trim()) { onUpdate(id, { name: editName.trim() }); setEditId(null); }
      };

      const getDevices = (name) => units.filter(u => u.list === name && !u.archived);
      const getDeviceCount = (name) => getDevices(name).length;

      return (
        <div>
          {/* Header row */}
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"16px" }}>
            <div style={{ color:C.muted, fontSize:"13px" }}>{activeLists.length} active list{activeLists.length !== 1 ? "s" : ""}</div>
            {adding ? (
              <div style={{ display:"flex", gap:"8px" }}>
                <input value={newName} onChange={e => setNewName(e.target.value)} onKeyDown={e => { if (e.key==="Enter") handleAdd(); if (e.key==="Escape") { setAdding(false); setNewName(""); } }} placeholder="List name…" style={{ ...inputSty, width:"200px" }} autoFocus />
                <button onClick={handleAdd} style={btnOrange}>Create</button>
                <button onClick={() => { setAdding(false); setNewName(""); }} style={btnGhost}>Cancel</button>
              </div>
            ) : (
              <button onClick={() => setAdding(true)} style={btnOrange}>+ New List</button>
            )}
          </div>

          {/* Active lists */}
          {activeLists.length === 0 && !adding ? (
            <div style={{ ...cardSty, textAlign:"center", padding:"52px 24px", color:C.muted }}>
              <div style={{ fontSize:"32px", marginBottom:"12px" }}>📋</div>
              <div style={{ fontWeight:"600", fontSize:"15px", marginBottom:"6px", color:C.text }}>No lists yet</div>
              <div style={{ fontSize:"13px" }}>Create a list to start grouping devices — e.g. "Lab", "Field Units", "Loaners"</div>
            </div>
          ) : (
            <div style={{ display:"flex", flexDirection:"column", gap:"10px" }}>
              {activeLists.map((list, idx) => {
                const count = getDeviceCount(list.name);
                const isEditing = editId === list.id;
                const color = LIST_COLORS[idx % LIST_COLORS.length];
                const isExpanded = expandedId === list.id;
                const devices = getDevices(list.name);
                return (
                  <div key={list.id} style={{ ...cardSty, padding:0, overflow:"hidden" }}>
                    {/* List header row */}
                    <div style={{ display:"flex", alignItems:"center", gap:"14px", padding:"16px 20px" }}>
                      <div style={{ width:"12px", height:"12px", borderRadius:"50%", background:color, flexShrink:0 }} />
                      {isEditing ? (
                        <input value={editName} onChange={e => setEditName(e.target.value)}
                          onKeyDown={e => { if (e.key==="Enter") handleRename(list.id); if (e.key==="Escape") setEditId(null); }}
                          style={{ ...inputSty, flex:1 }} autoFocus />
                      ) : (
                        <div style={{ flex:1, display:"flex", alignItems:"center", gap:"10px", cursor: count > 0 ? "pointer" : "default" }}
                          onClick={() => count > 0 && setExpandedId(isExpanded ? null : list.id)}>
                          <span style={{ fontWeight:"600", fontSize:"15px" }}>{list.name}</span>
                          <span style={{ color:C.muted, fontSize:"13px" }}>{count} device{count !== 1 ? "s" : ""}</span>
                          {count > 0 && <span style={{ fontSize:"13px", color:C.muted }}>{isExpanded ? "▾" : "▸"}</span>}
                        </div>
                      )}
                      <div style={{ display:"flex", gap:"8px" }}>
                        {isEditing ? (
                          <>
                            <button onClick={() => handleRename(list.id)} style={{ ...btnSmall, color:C.orange, borderColor:C.orange+"50", background:C.orange+"10" }}>Save</button>
                            <button onClick={() => setEditId(null)} style={btnSmall}>Cancel</button>
                          </>
                        ) : (
                          <>
                            <button onClick={() => onAddDevices && onAddDevices(list.name, list.id)} style={{ ...btnSmall, color:C.blue, borderColor:C.blue+"50", background:C.blue+"10" }}>+ Add devices</button>
                            <button onClick={() => { setEditId(list.id); setEditName(list.name); }} style={btnSmall}>Edit</button>
                            <button onClick={() => onUpdate(list.id, { archived: true })} style={{ ...btnSmall, color:C.muted }}>Archive</button>
                            <button onClick={() => setDeleteConfirm(list.id)} style={{ ...btnSmall, color:"#ff7070", borderColor:"#ff3b3b40" }}>Delete</button>
                          </>
                        )}
                      </div>
                    </div>

                    {/* Expanded device list */}
                    {isExpanded && (
                      <div style={{ borderTop:`1px solid ${C.border}` }}>
                        {devices.map((u, i) => (
                          <div key={u.id} onClick={() => onSelect && onSelect(u)}
                            style={{ display:"flex", alignItems:"center", gap:"14px", padding:"11px 20px 11px 46px", borderBottom: i < devices.length-1 ? `1px solid ${C.border}40` : "none", background: C.item+"60", cursor:"pointer", transition:"background 0.15s" }}
                            onMouseEnter={e => e.currentTarget.style.background = C.item+"cc"}
                            onMouseLeave={e => e.currentTarget.style.background = C.item+"60"}>
                            <Avatar name={u.owner || "?"} size={24} />
                            <div style={{ flex:1, minWidth:0 }}>
                              <div style={{ fontWeight:"600", fontSize:"13px", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{u.deviceName}</div>
                              <div style={{ color:C.muted, fontSize:"11px", fontFamily:"monospace" }}>{u.serialNumber}</div>
                            </div>
                            {u.type && <Tag color={modelColor(u.type)}>{u.type}</Tag>}
                            {u.owner && <span style={{ fontSize:"12px", color:C.muted, whiteSpace:"nowrap" }}>{u.owner}</span>}
                            <span style={{ fontSize:"11px", color:"#555", whiteSpace:"nowrap" }}>Last seen: {u.lastSeen || "—"}</span>
                            <span style={{ fontSize:"11px", color:C.muted }}>›</span>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}

          {/* Archived lists */}
          {archivedLists.length > 0 && (
            <div style={{ marginTop:"24px" }}>
              <button onClick={() => setShowArchived(v => !v)} style={{ background:"none", border:"none", color:C.muted, cursor:"pointer", fontSize:"13px", padding:0, marginBottom:"12px" }}>
                {showArchived ? "▾" : "▸"} {archivedLists.length} archived list{archivedLists.length !== 1 ? "s" : ""}
              </button>
              {showArchived && (
                <div style={{ display:"flex", flexDirection:"column", gap:"8px" }}>
                  {archivedLists.map(list => (
                    <div key={list.id} style={{ ...cardSty, display:"flex", alignItems:"center", gap:"14px", padding:"14px 20px", opacity:0.6 }}>
                      <div style={{ width:"12px", height:"12px", borderRadius:"50%", background:C.muted, flexShrink:0 }} />
                      <div style={{ flex:1 }}>
                        <span style={{ fontWeight:"600", fontSize:"15px" }}>{list.name}</span>
                      </div>
                      <div style={{ display:"flex", gap:"8px" }}>
                        <button onClick={() => onUpdate(list.id, { archived: false })} style={{ ...btnSmall, color:C.green, borderColor:C.green+"50" }}>Restore</button>
                        <button onClick={() => setDeleteConfirm(list.id)} style={{ ...btnSmall, color:"#ff7070", borderColor:"#ff3b3b40" }}>Delete</button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* Delete confirmation modal */}
          {deleteConfirm && (() => {
            const target = lists.find(l => l.id === deleteConfirm);
            return (
              <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", backdropFilter:"blur(10px)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:300, padding:"20px" }}>
                <div style={{ background:"#17171b", border:`1px solid ${C.border}`, borderRadius:"16px", width:"100%", maxWidth:"360px", padding:"28px", boxShadow:"0 32px 100px rgba(0,0,0,0.7)" }}>
                  <div style={{ fontWeight:"700", fontSize:"16px", marginBottom:"10px" }}>Delete "{target?.name}"?</div>
                  <div style={{ color:C.muted, fontSize:"13px", lineHeight:"1.6", marginBottom:"24px" }}>Devices in this list won't be deleted — they'll just have no list assigned. This cannot be undone.</div>
                  <div style={{ display:"flex", gap:"10px" }}>
                    <button onClick={() => { onDelete(deleteConfirm); setDeleteConfirm(null); }} style={{ ...btnOrange, flex:1, background:"#ef4444", borderColor:"#ef4444" }}>Delete</button>
                    <button onClick={() => setDeleteConfirm(null)} style={{ ...btnGhost, flex:1 }}>Cancel</button>
                  </div>
                </div>
              </div>
            );
          })()}
        </div>
      );
    }

    // ─────────────────────────────────────────────────────────────────────────
    // RENDER
    // ─────────────────────────────────────────────────────────────────────────

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
